<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
  <title>التزامات الموظفين | نظام إدارة الخصومات</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@200..1000&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #6c5ce7;
      --primary-dark: #5649c0;
      --primary-soft: #8b7cf0;
      --success: #00b894;
      --danger: #d63031;
      --warning: #f39c12;
      --gray-bg: #f8f9ff;
      --card-bg: rgba(255,255,255,0.85);
      --shadow: 0 20px 35px -12px rgba(0,0,0,0.08);
      --radius-xl: 32px;
      --radius-lg: 24px;
    }

    body {
      font-family: "Cairo", sans-serif;
      background: linear-gradient(125deg, #f3f0ff 0%, #e9e4ff 100%);
      min-height: 100vh;
      color: #1e1a3a;
    }

    .glass-card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.5);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 32px;
      background: rgba(255,255,255,0.65);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,255,255,0.7);
      position: sticky;
      top: 0;
      z-index: 99;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-icon {
      background: linear-gradient(135deg, var(--primary), var(--primary-soft));
      width: 48px;
      height: 48px;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: white;
      box-shadow: 0 6px 14px rgba(108,92,231,0.3);
    }

    .brand-text {
      font-size: 1.6rem;
      font-weight: 700;
      background: linear-gradient(145deg, #2d2a4e, var(--primary));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .date-badge {
      background: white;
      padding: 8px 20px;
      border-radius: 60px;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--primary-dark);
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
    }

    .employee-card {
      padding: 28px;
      margin-bottom: 32px;
    }

    .employee-header {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
      border-bottom: 2px dashed rgba(108,92,231,0.2);
      padding-bottom: 20px;
      margin-bottom: 24px;
    }

    .employee-avatar {
      width: 80px;
      height: 80px;
      background: linear-gradient(145deg, var(--primary), var(--primary-soft));
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      color: white;
    }

    .employee-name {
      font-size: 1.8rem;
      font-weight: 800;
    }

    .employee-phone {
      color: #5a5690;
      margin-top: 4px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px,1fr));
      gap: 20px;
    }

    .stat-block {
      background: rgba(255,255,255,0.5);
      border-radius: 28px;
      padding: 18px;
      text-align: center;
    }

    .stat-label {
      font-size: 0.85rem;
      color: #6c6a8b;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 800;
      color: var(--primary);
    }

    .salary .stat-value { color: var(--success); }
    .deductions .stat-value { color: var(--danger); }
    .remaining .stat-value { color: var(--warning); }

    .month-selector {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      padding: 14px 28px;
      margin-bottom: 28px;
      gap: 16px;
    }

    .month-controls {
      display: flex;
      gap: 18px;
      align-items: center;
    }

    .month-btn {
      background: linear-gradient(145deg, var(--primary), var(--primary-soft));
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      color: white;
      font-size: 1.2rem;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 6px 12px rgba(108,92,231,0.2);
    }

    .month-btn:hover {
      transform: scale(1.05);
    }

    .current-month {
      font-weight: 700;
      font-size: 1.2rem;
      background: rgba(255,255,255,0.7);
      padding: 6px 24px;
      border-radius: 60px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px,1fr));
      gap: 22px;
      margin-bottom: 35px;
    }

    .summary-card {
      text-align: center;
      padding: 24px;
      border-radius: var(--radius-lg);
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(8px);
    }

    .summary-icon {
      width: 56px;
      height: 56px;
      background: rgba(108,92,231,0.15);
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      margin: 0 auto 12px;
      color: var(--primary);
    }

    .summary-amount {
      font-size: 1.8rem;
      font-weight: 800;
    }

    .btn-add {
      background: linear-gradient(135deg, var(--primary), var(--primary-soft));
      width: 100%;
      max-width: 380px;
      margin: 10px auto 32px;
      padding: 16px;
      border: none;
      border-radius: 80px;
      color: white;
      font-weight: 700;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 8px 18px rgba(108,92,231,0.3);
    }

    .btn-add:hover {
      transform: translateY(-3px);
    }

    .commitments-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 24px;
      margin-top: 16px;
    }

    .commit-card {
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(8px);
      border-radius: 32px;
      padding: 20px;
      border-top: 5px solid var(--primary);
      transition: 0.2s;
    }

    .commit-card.money { border-top-color: var(--success); }
    .commit-card.product { border-top-color: var(--primary); }

    .commit-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      border-bottom: 1px dashed rgba(0,0,0,0.1);
      padding-bottom: 12px;
      margin-bottom: 16px;
    }

    .commit-type {
      font-weight: 700;
      gap: 6px;
      display: flex;
    }

    .commit-amount {
      font-size: 1.7rem;
      font-weight: 800;
    }

    .product-detail {
      background: #f0edff;
      border-radius: 20px;
      padding: 12px;
      margin: 12px 0;
    }

    .empty-state {
      text-align: center;
      padding: 60px;
      background: rgba(255,255,255,0.6);
      border-radius: 48px;
      grid-column: 1/-1;
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      justify-content: center;
      align-items: center;
      z-index: 1000;
      padding: 20px;
    }

    .modal-container {
      background: white;
      width: 100%;
      max-width: 520px;
      border-radius: 48px;
      overflow: hidden;
      box-shadow: 0 30px 50px rgba(0,0,0,0.3);
    }

    .modal-header {
      background: linear-gradient(145deg, var(--primary), var(--primary-soft));
      padding: 20px 28px;
      color: white;
      display: flex;
      justify-content: space-between;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-control {
      width: 100%;
      padding: 14px 18px;
      border-radius: 28px;
      border: 1.5px solid #e2e0f0;
      font-family: inherit;
      font-size: 1rem;
      transition: 0.2s;
    }

    .form-control:focus {
      border-color: var(--primary);
      outline: none;
    }

    .suggestions-list {
      position: absolute;
      background: white;
      width: 100%;
      border-radius: 24px;
      box-shadow: 0 12px 28px rgba(0,0,0,0.15);
      max-height: 220px;
      overflow-y: auto;
      z-index: 20;
      display: none;
    }

    .suggestions-list.active {
      display: block;
    }

    .suggestion-item {
      padding: 12px 16px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
    }

    .modal-footer {
      display: flex;
      gap: 12px;
      padding: 20px 28px;
      background: #f5f3ff;
    }

    .btn {
      flex: 1;
      padding: 14px;
      border-radius: 40px;
      border: none;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .toast {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      padding: 12px 28px;
      border-radius: 80px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      z-index: 2000;
      font-weight: 500;
      border-right: 6px solid var(--primary);
      animation: slideDown 0.3s ease;
    }

    @keyframes slideDown {
      from { top: -100px; opacity: 0; }
      to { top: 24px; opacity: 1; }
    }

    .footer {
      text-align: center;
      padding: 28px;
      margin-top: 60px;
      color: #6a6890;
    }

    .deduction-item {
      background: white;
      padding: 10px 15px;
      margin-bottom: 8px;
      border-radius: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-right: 3px solid var(--danger);
    }

    .deduction-reason {
      font-weight: 600;
      color: #2d2a4e;
    }

    .deduction-amount {
      color: var(--danger);
      font-weight: 700;
    }

    @media (max-width: 640px) {
      .container { padding: 0 16px; }
      .employee-name { font-size: 1.4rem; }
      .stat-value { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="brand">
    <div class="brand-icon"><i class="fas fa-hand-holding-usd"></i></div>
    <div class="brand-text">التزامات الموظفين</div>
  </div>
  <div class="date-badge" id="currentDate"></div>
</div>

<div class="container">
  <div class="employee-card glass-card">
    <div class="employee-header">
      <div class="employee-avatar"><i class="fas fa-user-circle"></i></div>
      <div>
        <div class="employee-name" id="empName">---</div>
        <div class="employee-phone"><i class="fas fa-phone-alt"></i> <span id="empPhone">---</span></div>
      </div>
    </div>
    <div class="stats-grid">
      <div class="stat-block salary"><div class="stat-label">💰 الراتب الأساسي</div><div class="stat-value" id="baseSalary">0 ج.م</div></div>
      <div class="stat-block deductions"><div class="stat-label">📉 إجمالي الخصومات</div><div class="stat-value" id="totalDeductions">0 ج.م</div></div>
      <div class="stat-block remaining"><div class="stat-label">✨ المتبقي من الراتب</div><div class="stat-value" id="remainingSalary">0 ج.م</div></div>
    </div>
    <div style="margin-top: 20px; background: linear-gradient(135deg, #fff5e6, #fff0e0); border-radius: 20px; padding: 18px;">
      <i class="fas fa-receipt"></i> <strong>📋 قائمة الخصومات الثابتة:</strong>
      <div id="deductionsList" style="margin-top: 12px;"></div>
    </div>
  </div>

  <div class="month-selector glass-card">
    <div><i class="fas fa-calendar-week"></i> <strong>الشهر المستهدف</strong></div>
    <div class="month-controls">
      <button class="month-btn" id="prevMonthBtn"><i class="fas fa-chevron-right"></i></button>
      <div class="current-month" id="currentMonthDisplay">يناير 2025</div>
      <button class="month-btn" id="nextMonthBtn"><i class="fas fa-chevron-left"></i></button>
    </div>
  </div>

  <div class="summary-grid" id="summaryGrid" style="display: none;">
    <div class="summary-card"><div class="summary-icon"><i class="fas fa-coins"></i></div><div class="summary-label">إجمالي الالتزامات</div><div class="summary-amount" id="totalCommitmentsAmount">0 ج.م</div></div>
    <div class="summary-card"><div class="summary-icon"><i class="fas fa-chart-line"></i></div><div class="summary-label">الخصم الشهري</div><div class="summary-amount" id="monthlyDeductionAmount">0 ج.م</div></div>
    <div class="summary-card"><div class="summary-icon"><i class="fas fa-hand-holding-heart"></i></div><div class="summary-label">المتبقي بعد الخصم</div><div class="summary-amount" id="netAfterDeduction">0 ج.م</div></div>
  </div>

  <button class="btn-add" id="openModalBtn"><i class="fas fa-plus-circle"></i> تسجيل التزام جديد</button>

  <div style="text-align: center; margin: 15px 0;"><h3 style="font-weight: 600;"><i class="fas fa-list-ul"></i> سجل الالتزامات</h3></div>
  <div id="commitmentsContainer" class="commitments-grid">
    <div class="empty-state"><i class="fas fa-spinner fa-pulse"></i> جاري التحميل...</div>
  </div>
</div>

<footer class="footer"><i class="fas fa-crown"></i> <strong>MR Fikry</strong> | نظام إدارة الالتزامات</footer>

<div class="modal" id="commitModal">
  <div class="modal-container">
    <div class="modal-header"><h3><i class="fas fa-file-signature"></i> تسجيل التزام</h3><button id="closeModalBtn" style="background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer;"><i class="fas fa-times"></i></button></div>
    <div style="padding: 28px;">
      <div class="form-group"><label><i class="fas fa-tag"></i> نوع الالتزام</label><select id="commitType" class="form-control"><option value="money">💰 التزام مالي</option><option value="product">📦 التزام عيني (منتج)</option></select></div>
      <div id="productSearchGroup" style="display: none;">
        <div class="form-group"><label><i class="fas fa-box"></i> البحث عن منتج</label>
          <input type="text" id="productSearchInput" class="form-control" placeholder="اسم المنتج أو السيريال" autocomplete="off">
          <div id="productSuggestions" class="suggestions-list"></div>
        </div>
      </div>
      <div class="form-group"><label><i class="fas fa-calculator"></i> القيمة (ج.م / الكمية)</label><input type="number" id="commitAmount" class="form-control" placeholder="أدخل المبلغ أو القيمة" step="0.01"></div>
      <div class="form-group"><label><i class="fas fa-pen-alt"></i> ملاحظات</label><textarea id="commitNote" class="form-control" rows="2" placeholder="سبب الالتزام ..."></textarea></div>
      <div class="form-group"><label><i class="fas fa-calendar-month"></i> الشهر المستهدف</label><input type="month" id="targetMonthInput" class="form-control"></div>
    </div>
    <div class="modal-footer"><button id="saveCommitBtn" class="btn btn-primary"><i class="fas fa-save"></i> حفظ</button><button id="cancelModalBtn" class="btn" style="background:#ccc;">إلغاء</button></div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, query, where, doc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDuwURf9DxvGlEIox6J92iPF9-lmnKETH8",
    authDomain: "login-employees1.firebaseapp.com",
    projectId: "login-employees1",
    storageBucket: "login-employees1.firebasestorage.app",
    messagingSenderId: "907414298566",
    appId: "1:907414298566:web:0141762effe0e9ff289cc7"
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const currentEmployee = JSON.parse(localStorage.getItem('currentEmployee'));
  if (!currentEmployee) { alert("الرجاء تسجيل الدخول أولاً"); window.location.href = 'index.html'; }

  let employeeDocId = null;
  let employeeFullData = { salary: 0, deductions: [] };
  let allProducts = [];
  let selectedProduct = null;
  let currentDate = new Date();
  let currentYearMonth = `${currentDate.getFullYear()}-${String(currentDate.getMonth()+1).padStart(2,'0')}`;

  // DOM Elements
  const empNameSpan = document.getElementById('empName');
  const empPhoneSpan = document.getElementById('empPhone');
  const baseSalarySpan = document.getElementById('baseSalary');
  const totalDeductionsSpan = document.getElementById('totalDeductions');
  const remainingSalarySpan = document.getElementById('remainingSalary');
  const deductionsListDiv = document.getElementById('deductionsList');
  const currentMonthDisplay = document.getElementById('currentMonthDisplay');
  const summaryGrid = document.getElementById('summaryGrid');
  const totalCommitmentsSpan = document.getElementById('totalCommitmentsAmount');
  const monthlyDeductionSpan = document.getElementById('monthlyDeductionAmount');
  const netAfterSpan = document.getElementById('netAfterDeduction');
  const commitmentsContainer = document.getElementById('commitmentsContainer');
  const modal = document.getElementById('commitModal');
  const commitType = document.getElementById('commitType');
  const productGroup = document.getElementById('productSearchGroup');
  const productSearchInput = document.getElementById('productSearchInput');
  const suggestionsDiv = document.getElementById('productSuggestions');
  const commitAmount = document.getElementById('commitAmount');
  const commitNote = document.getElementById('commitNote');
  const targetMonthInput = document.getElementById('targetMonthInput');
  
  document.getElementById('openModalBtn').onclick = () => { modal.style.display = 'flex'; resetModalForm(); };
  const closeModalFunc = () => { modal.style.display = 'none'; };
  document.getElementById('closeModalBtn').onclick = closeModalFunc;
  document.getElementById('cancelModalBtn').onclick = closeModalFunc;
  modal.addEventListener('click', (e) => { if(e.target === modal) closeModalFunc(); });
  
  commitType.addEventListener('change', () => { 
    productGroup.style.display = commitType.value === 'product' ? 'block' : 'none'; 
    if(commitType.value !== 'product') selectedProduct = null; 
  });
  
  async function loadEmployeeAndDeductions() {
    try {
      const q = query(collection(db, "employees"), where("phone", "==", currentEmployee.phone));
      const snap = await getDocs(q);
      if(snap.empty) throw new Error("موظف غير موجود");
      const docRef = snap.docs[0];
      employeeDocId = docRef.id;
      employeeFullData = { id: docRef.id, ...docRef.data() };
      currentEmployee.id = employeeDocId;
      localStorage.setItem("currentEmployee", JSON.stringify(currentEmployee));
      empNameSpan.textContent = employeeFullData.name || currentEmployee.name || "غير محدد";
      empPhoneSpan.textContent = employeeFullData.phone || currentEmployee.phone;
      const salary = employeeFullData.salary || 0;
      baseSalarySpan.textContent = `${salary} ج.م`;
      
      const deductionsArr = employeeFullData.deductions || [];
      let totalDed = 0;
      
      if(deductionsArr.length === 0) {
        deductionsListDiv.innerHTML = '<div style="color: #888; padding: 8px;">لا توجد خصومات مسجلة</div>';
      } else {
        let html = '';
        deductionsArr.forEach(d => { 
          const amount = Number(d.amount) || 0;
          totalDed += amount; 
          html += `
            <div class="deduction-item">
              <span class="deduction-reason"><i class="fas fa-exclamation-triangle" style="color: #d63031; margin-left: 8px;"></i> ${d.reason || 'خصم ثابت'}</span>
              <span class="deduction-amount">${amount} ج.م</span>
            </div>
          `;
        });
        deductionsListDiv.innerHTML = html;
      }
      
      totalDeductionsSpan.textContent = `${totalDed} ج.م`;
      const remainingRaw = salary - totalDed;
      remainingSalarySpan.textContent = `${remainingRaw} ج.م`;
      employeeFullData.deductionsTotal = totalDed;
      
      // Recalculate monthly summary with deductions
      await loadCommitmentsForMonth();
    } catch(e) { console.error(e); showToast("خطأ في تحميل بيانات الموظف", "error"); }
  }
  
  async function loadProducts() {
    try {
      const snap = await getDocs(collection(db, "products"));
      allProducts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    } catch(e) { console.error(e); }
  }
  
  function updateMonthUI() {
    const [year, month] = currentYearMonth.split('-');
    const monthNames = ['يناير','فبراير','مارس','إبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
    currentMonthDisplay.textContent = `${monthNames[parseInt(month)-1]} ${year}`;
    targetMonthInput.value = currentYearMonth;
  }
  
  window.changeMonth = (delta) => {
    let [year, month] = currentYearMonth.split('-').map(Number);
    let newDate = new Date(year, month-1 + delta, 1);
    currentYearMonth = `${newDate.getFullYear()}-${String(newDate.getMonth()+1).padStart(2,'0')}`;
    updateMonthUI();
    loadCommitmentsForMonth();
  };
  document.getElementById('prevMonthBtn').onclick = () => changeMonth(-1);
  document.getElementById('nextMonthBtn').onclick = () => changeMonth(1);
  
  async function loadCommitmentsForMonth() {
    if(!employeeDocId) { 
      commitmentsContainer.innerHTML = '<div class="empty-state">جاري تهيئة البيانات...</div>'; 
      return; 
    }
    commitmentsContainer.innerHTML = '<div class="empty-state"><i class="fas fa-spinner fa-pulse"></i> جاري التحميل...</div>';
    try {
      const commitmentsRef = collection(db, 'employees', employeeDocId, 'commitments');
      const qSnap = await getDocs(commitmentsRef);
      let monthCommitments = [];
      let totalMonthlyAmount = 0;
      
      qSnap.forEach(docSnap => {
        const data = docSnap.data();
        // Only show commitments for the selected month
        if(data.month === currentYearMonth) {
          monthCommitments.push({ id: docSnap.id, ...data });
          totalMonthlyAmount += (Number(data.amount) || 0);
        }
      });
      
      if(monthCommitments.length === 0) {
        commitmentsContainer.innerHTML = `<div class="empty-state"><i class="far fa-calendar-times"></i> لا توجد التزامات لهذا الشهر</div>`;
        summaryGrid.style.display = 'none';
        return;
      }
      
      summaryGrid.style.display = 'grid';
      totalCommitmentsSpan.textContent = `${totalMonthlyAmount} ج.م`;
      const salary = employeeFullData.salary || 0;
      const fixedDed = employeeFullData.deductionsTotal || 0;
      const monthlyDeductionAmount = totalMonthlyAmount + fixedDed;
      monthlyDeductionSpan.textContent = `${monthlyDeductionAmount} ج.م`;
      const net = salary - monthlyDeductionAmount;
      netAfterSpan.textContent = `${net} ج.م`;
      netAfterSpan.style.color = net >= 0 ? '#00b894' : '#d63031';
      
      let html = '';
      monthCommitments.forEach(c => {
        const isMoney = c.type === 'money';
        html += `<div class="commit-card ${isMoney ? 'money' : 'product'}">
          <div class="commit-header">
            <span class="commit-type"><i class="fas ${isMoney ? 'fa-money-bill-wave' : 'fa-boxes'}"></i> ${isMoney ? 'التزام مالي' : 'التزام عيني'}</span>
            <span class="commit-amount">${c.amount} ${isMoney ? 'ج.م' : 'وحدة'}</span>
          </div>`;
        if(c.product) {
          html += `<div class="product-detail"><i class="fas fa-cube"></i> <strong>${c.product.name || 'منتج'}</strong><br><small>سعر الوحدة: ${c.product.sellPrice || 0} ج.م | سيريال: ${c.product.serial || '-'}</small></div>`;
        }
        if(c.note && c.note !== "بدون ملاحظات") html += `<div><i class="fas fa-comment"></i> ${c.note}</div>`;
        html += `<div style="margin-top:12px; font-size:12px; color:#888;"><i class="far fa-clock"></i> ${c.createdAt || ''}</div></div>`;
      });
      commitmentsContainer.innerHTML = html;
    } catch(e) { 
      commitmentsContainer.innerHTML = `<div class="empty-state">خطأ في التحميل</div>`; 
      console.error(e); 
    }
  }
  
  function resetModalForm() {
    document.getElementById('commitType').value = 'money';
    productGroup.style.display = 'none';
    commitAmount.value = '';
    commitNote.value = '';
    productSearchInput.value = '';
    selectedProduct = null;
    suggestionsDiv.classList.remove('active');
    targetMonthInput.value = currentYearMonth;
  }
  
  window.searchProductsDynamic = () => {
    const term = productSearchInput.value.trim().toLowerCase();
    if(term.length < 1) { suggestionsDiv.classList.remove('active'); return; }
    const filtered = allProducts.filter(p => (p.name?.toLowerCase().includes(term) || p.serial?.toLowerCase().includes(term)));
    if(filtered.length) {
      suggestionsDiv.innerHTML = filtered.map(p => `<div class="suggestion-item" data-name="${p.name || ''}" data-sellprice="${p.sellPrice || 0}" data-serial="${p.serial || ''}">
        <strong>${p.name || 'منتج'}</strong><br><small>سعر: ${p.sellPrice || 0} ج.م | سيريال: ${p.serial || '-'}</small>
      </div>`).join('');
      suggestionsDiv.classList.add('active');
      document.querySelectorAll('.suggestion-item').forEach(el => {
        el.addEventListener('click', () => {
          selectedProduct = {
            name: el.dataset.name,
            sellPrice: parseFloat(el.dataset.sellprice),
            serial: el.dataset.serial
          };
          productSearchInput.value = selectedProduct.name;
          suggestionsDiv.classList.remove('active');
        });
      });
    } else { suggestionsDiv.classList.remove('active'); }
  };
  productSearchInput.addEventListener('input', window.searchProductsDynamic);
  document.addEventListener('click', (e) => { if(!productSearchInput.contains(e.target) && !suggestionsDiv.contains(e.target)) suggestionsDiv.classList.remove('active'); });
  
  document.getElementById('saveCommitBtn').onclick = async () => {
    const type = commitType.value;
    const amount = parseFloat(commitAmount.value);
    if(isNaN(amount) || amount <= 0) { showToast("أدخل قيمة صحيحة", "error"); return; }
    if(type === 'product' && !selectedProduct) { showToast("اختر منتجًا من القائمة", "error"); return; }
    const monthTarget = targetMonthInput.value;
    if(!monthTarget) { showToast("حدد الشهر المستهدف", "error"); return; }
    
    const commitmentObj = {
      type: type,
      amount: amount,
      note: commitNote.value.trim() || "بدون ملاحظات",
      month: monthTarget,
      createdAt: new Date().toLocaleString('ar-EG'),
      employeeName: currentEmployee.name,
      employeePhone: currentEmployee.phone
    };
    if(type === 'product' && selectedProduct) commitmentObj.product = { ...selectedProduct };
    try {
      await addDoc(collection(db, 'employees', employeeDocId, 'commitments'), commitmentObj);
      showToast("تم تسجيل الالتزام بنجاح ✅", "success");
      closeModalFunc();
      loadCommitmentsForMonth();
    } catch(e) { showToast("حدث خطأ", "error"); console.error(e); }
  };
  
  function showToast(msg, type) {
    const toastDiv = document.createElement('div');
    toastDiv.className = 'toast';
    toastDiv.style.borderRightColor = type === 'success' ? '#00b894' : '#d63031';
    toastDiv.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-triangle'}"></i> ${msg}`;
    document.body.appendChild(toastDiv);
    setTimeout(() => { toastDiv.remove(); }, 2800);
  }
  
  // Display current date
  const now = new Date();
  document.getElementById('currentDate').innerHTML = `<i class="far fa-calendar-alt"></i> ${now.toLocaleDateString('ar-EG')}`;
  
  (async function init() {
    await loadEmployeeAndDeductions();
    await loadProducts();
    updateMonthUI();
    await loadCommitmentsForMonth();
  })();
</script>
</body>
</html>
