<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>MR Fikry | إضافة منتجات - اقتراحات ذكية</title>
    <meta name="description" content="صفحة إدارة المنتجات - إضافة منتجات جديدة مع اقتراحات ذكية">
    <meta name="author" content="MR Fikry">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #f5f0ff 0%, #e9e4ff 100%);
            min-height: 100vh;
            color: #2d2a4e;
            line-height: 1.5;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(108, 92, 231, 0.12) 0%, transparent 70%);
            z-index: -1;
            pointer-events: none;
        }

        /* Header */
        .header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
            position: sticky;
            top: 0;
            z-index: 100;
            flex-wrap: wrap;
            gap: 15px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(145deg, #6c5ce7, #8b7cf0);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 26px;
            box-shadow: 0 8px 16px -6px rgba(108, 92, 231, 0.4);
        }

        .brand-text {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(145deg, #4a3f96, #6c5ce7);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand-text span {
            font-weight: 300;
            font-size: 16px;
            color: #8f8bb3;
            -webkit-text-fill-color: #8f8bb3;
            margin-right: 6px;
        }

        .date-badge {
            background: white;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 500;
            color: #4a3f96;
            border: 1px solid rgba(108, 92, 231, 0.15);
            font-size: 14px;
        }

        .date-badge i {
            margin-left: 8px;
        }

        /* Navigation */
        .nav-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 30px auto 20px;
            gap: 20px;
            padding: 0 20px;
            flex-wrap: wrap;
        }

        .nav-link {
            text-decoration: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-link.active {
            background: linear-gradient(145deg, #6c5ce7, #8b7cf0);
            color: white;
            box-shadow: 0 10px 20px -8px rgba(108, 92, 231, 0.4);
        }

        .nav-link:not(.active) {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(108, 92, 231, 0.2);
            color: #4a3f96;
        }

        .nav-link:not(.active):hover {
            background: white;
            transform: translateY(-2px);
        }

        /* Main Card */
        .main-card {
            max-width: 550px;
            margin: 20px auto 50px;
            padding: 0 20px;
        }

        .content-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 35px;
            padding: 35px 30px;
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.1);
        }

        .card-title {
            text-align: center;
            margin-bottom: 30px;
        }

        .card-title h2 {
            font-size: 28px;
            font-weight: 600;
            color: #2d2a4e;
            margin-bottom: 8px;
        }

        /* Form */
        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-label {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            color: #4a3f96;
            font-weight: 500;
            font-size: 14px;
        }

        .input-label i {
            font-size: 16px;
            color: #6c5ce7;
        }

        .modern-input {
            width: 100%;
            padding: 15px 18px;
            border: 2px solid rgba(108, 92, 231, 0.15);
            border-radius: 20px;
            font-size: 15px;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s;
            outline: none;
            background: white;
        }

        .modern-input:focus {
            border-color: #6c5ce7;
            box-shadow: 0 0 0 4px rgba(108, 92, 231, 0.15);
        }

        /* Suggestions Box */
        .suggestions-container {
            position: relative;
            width: 100%;
        }

        .suggestions-box {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            max-height: 280px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
            margin-top: 5px;
            border: 1px solid rgba(108, 92, 231, 0.2);
        }

        .suggestions-box.active {
            display: block;
        }

        .suggestion-item {
            padding: 15px;
            border-bottom: 1px solid #f0eef7;
            cursor: pointer;
            transition: all 0.2s;
        }

        .suggestion-item:hover {
            background: linear-gradient(135deg, #f5f0ff, #ede7ff);
        }

        .suggestion-name {
            font-weight: 700;
            color: #6c5ce7;
            font-size: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .suggestion-price {
            background: #00b894;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
        }

        .suggestion-details {
            display: flex;
            gap: 15px;
            margin-top: 8px;
            font-size: 13px;
            color: #8f8bb3;
            flex-wrap: wrap;
        }

        .suggestion-details i {
            margin-left: 5px;
            width: 18px;
        }

        /* Save Button */
        .save-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(145deg, #6c5ce7, #8b7cf0);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 18px;
            font-weight: 600;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 25px;
            box-shadow: 0 10px 25px -8px #6c5ce7;
        }

        .save-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px -8px #6c5ce7;
        }

        /* Toast Message */
        .toast-message {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 14px 30px;
            border-radius: 50px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            z-index: 2000;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideDown 0.3s ease;
            border-right: 5px solid #6c5ce7;
        }

        .toast-message.success {
            border-right-color: #00b894;
        }

        .toast-message.error {
            border-right-color: #d63031;
        }

        @keyframes slideDown {
            from {
                top: -100px;
                opacity: 0;
            }
            to {
                top: 30px;
                opacity: 1;
            }
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 25px;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(8px);
            border-top: 1px solid rgba(255, 255, 255, 0.6);
            color: #5b5880;
            font-size: 15px;
            margin-top: 30px;
        }

        .footer strong {
            color: #6c5ce7;
        }

        .watermark {
            position: fixed;
            bottom: 20px;
            left: 20px;
            opacity: 0.05;
            font-size: 80px;
            font-weight: 800;
            color: #2d2a4e;
            pointer-events: none;
            z-index: -1;
            transform: rotate(-10deg);
        }

        @media (max-width: 768px) {
            .header {
                padding: 15px 25px;
            }
            .brand-text {
                font-size: 20px;
            }
            .content-card {
                padding: 25px 20px;
            }
            .card-title h2 {
                font-size: 24px;
            }
        }

        @media (max-width: 480px) {
            .header {
                flex-direction: column;
                text-align: center;
            }
            .nav-bar {
                gap: 12px;
            }
            .nav-link {
                padding: 8px 18px;
                font-size: 14px;
            }
            .content-card {
                padding: 20px 15px;
            }
            .suggestion-name {
                flex-direction: column;
                align-items: flex-start;
            }
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f0edff;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #6c5ce7;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="watermark">MR Fikry</div>

    <header class="header">
        <div class="brand">
            <div class="brand-icon">
                <i class="fas fa-store"></i>
            </div>
            <div class="brand-text">
                MR Fikry <span>| المنتجات</span>
            </div>
        </div>
        <div class="date-badge">
            <i class="far fa-calendar-alt"></i>
            <span id="currentDate"></span>
        </div>
    </header>

    <div class="nav-bar">
        <a href="#" class="nav-link active">
            <i class="fas fa-plus-circle"></i>
            إضافة منتجات
        </a>
        <a href="/MR-Fikry/prodacts/" class="nav-link" id="viewProductsLink">
            <i class="fas fa-boxes"></i>
            عرض المنتجات
        </a>
    </div>

    <div class="main-card">
        <div class="content-card">
            <div class="card-title">
                <h2>إضافة منتج جديد</h2>
                <div class="title-decoration">
                    <i class="fas fa-minus"></i>
                    <span>املأ بيانات المنتج</span>
                    <i class="fas fa-minus"></i>
                </div>
            </div>

            <div id="form">
                <!-- حقل اسم المنتج مع الاقتراحات -->
                <div class="input-group">
                    <div class="input-label">
                        <i class="fas fa-tag"></i>
                        <span>اسم المنتج</span>
                    </div>
                    <div class="suggestions-container">
                        <input class="modern-input" id="productName" placeholder="اكتب اسم المنتج... (سيظهر اقتراحات بعد 4 أحرف)" autocomplete="off">
                        <div class="suggestions-box" id="suggestionsBox"></div>
                    </div>
                </div>

                <div class="input-group">
                    <div class="input-label">
                        <i class="fas fa-barcode"></i>
                        <span>السيريال</span>
                    </div>
                    <input class="modern-input" id="serial" placeholder="أدخل الرقم التسلسلي">
                </div>

                <div class="input-group">
                    <div class="input-label">
                        <i class="fas fa-cubes"></i>
                        <span>الكمية</span>
                    </div>
                    <input class="modern-input" id="quantity" type="number" placeholder="أدخل الكمية">
                </div>

                <div class="input-group">
                    <div class="input-label">
                        <i class="fas fa-coins"></i>
                        <span>سعر الشراء</span>
                    </div>
                    <input class="modern-input" id="buyPrice" type="number" placeholder="أدخل سعر الشراء">
                </div>

                <div class="input-group">
                    <div class="input-label">
                        <i class="fas fa-chart-line"></i>
                        <span>سعر البيع</span>
                    </div>
                    <input class="modern-input" id="sellPrice" type="number" placeholder="أدخل سعر البيع">
                </div>

                <button onclick="saveProduct()" class="save-btn">
                    <i class="fas fa-save"></i>
                    حفظ المنتج
                </button>
            </div>
        </div>
    </div>

    <footer class="footer">
        <i class="fas fa-crown"></i> 
        <strong>MR Fikry</strong> | نظام إدارة المنتجات مع اقتراحات ذكية
        <i class="fas fa-sparkles"></i>
    </footer>

 <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, where } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDuwURf9DxvGlEIox6J92iPF9-lmnKETH8",
            authDomain: "login-employees1.firebaseapp.com",
            projectId: "login-employees1",
            storageBucket: "login-employees1.firebasestorage.app",
            messagingSenderId: "907414298566",
            appId: "1:907414298566:web:0141762effe0e9ff289cc7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allProducts = []; // تخزين جميع المنتجات للاقتراحات
        let searchTimeout; // متغير لتأخير البحث

        // عرض التاريخ
        const now = new Date();
        document.getElementById('currentDate').textContent = now.toLocaleDateString('ar-EG');

        // جلب جميع المنتجات من Firebase
        async function loadAllProducts() {
            try {
                const productsRef = collection(db, "products");
                const q = query(productsRef, orderBy("name"));
                const querySnapshot = await getDocs(q);
                allProducts = [];
                querySnapshot.forEach((doc) => {
                    allProducts.push({
                        id: doc.id,
                        ...doc.data()
                    });
                });
                console.log(`تم تحميل ${allProducts.length} منتج للاقتراحات`);
            } catch (error) {
                console.error("خطأ في تحميل المنتجات:", error);
            }
        }

        // عرض الاقتراحات مع تحسين الأداء
        function showSuggestions() {
            const input = document.getElementById('productName');
            const searchText = input.value.trim();
            const suggestionsBox = document.getElementById('suggestionsBox');
            
            // إذا كان النص فارغاً، إخفاء الاقتراحات
            if (searchText === '') {
                suggestionsBox.classList.remove('active');
                suggestionsBox.innerHTML = '';
                return;
            }

            // البحث السريع عن المنتجات المطابقة
            const searchLower = searchText.toLowerCase();
            const filtered = allProducts.filter(product => {
                const productName = (product.name || '').toLowerCase();
                // بحث سريع: مطابقة تامة أو تبدأ بالنص المدخل
                return productName === searchLower || productName.startsWith(searchLower) || productName.includes(searchLower);
            });

            if (filtered.length > 0) {
                suggestionsBox.innerHTML = filtered.map(product => `
                    <div class="suggestion-item" onclick="selectProduct('${product.id}', '${escapeHtml(product.name)}', '${escapeHtml(product.serial || '')}', ${product.sellPrice || 0}, ${product.quantity || 0}, ${product.buyPrice || 0})">
                        <div class="suggestion-name">
                            <span><i class="fas fa-box"></i> ${escapeHtml(product.name)}</span>
                            <span class="suggestion-price">${(product.sellPrice || 0).toFixed(2)} ج.م</span>
                        </div>
                        <div class="suggestion-details">
                            <span><i class="fas fa-barcode"></i> سيريال: ${escapeHtml(product.serial || '-')}</span>
                            <span><i class="fas fa-cubes"></i> الكمية: ${product.quantity || 0}</span>
                            <span><i class="fas fa-coins"></i> سعر الشراء: ${(product.buyPrice || 0).toFixed(2)} ج.م</span>
                        </div>
                    </div>
                `).join('');
                suggestionsBox.classList.add('active');
            } else {
                suggestionsBox.classList.remove('active');
                suggestionsBox.innerHTML = '';
            }
        }

        // دالة مساعدة لتنقية النص من علامات HTML
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // اختيار منتج من الاقتراحات
        window.selectProduct = function(id, name, serial, sellPrice, quantity, buyPrice) {
            document.getElementById('productName').value = name;
            document.getElementById('serial').value = serial;
            document.getElementById('quantity').value = quantity;
            document.getElementById('buyPrice').value = buyPrice;
            document.getElementById('sellPrice').value = sellPrice;
            
            // إخفاء صندوق الاقتراحات
            const suggestionsBox = document.getElementById('suggestionsBox');
            suggestionsBox.classList.remove('active');
            
            showToast(`✅ تم اختيار المنتج: ${name}`, 'success');
        };

        // حفظ المنتج مع التحقق من الاسم المكرر
        window.saveProduct = async function() {
            const name = document.getElementById("productName").value.trim();
            const serial = document.getElementById("serial").value.trim();
            const quantity = document.getElementById("quantity").value.trim();
            const buyPrice = document.getElementById("buyPrice").value.trim();
            const sellPrice = document.getElementById("sellPrice").value.trim();

            if (!name) {
                showToast("❌ الرجاء إدخال اسم المنتج!", "error");
                return;
            }
            if (!serial) {
                showToast("❌ الرجاء إدخال السيريال!", "error");
                return;
            }
            if (!quantity || isNaN(quantity) || Number(quantity) < 0) {
                showToast("❌ الرجاء إدخال كمية صحيحة!", "error");
                return;
            }
            if (!buyPrice || isNaN(buyPrice) || Number(buyPrice) < 0) {
                showToast("❌ الرجاء إدخال سعر شراء صحيح!", "error");
                return;
            }
            if (!sellPrice || isNaN(sellPrice) || Number(sellPrice) < 0) {
                showToast("❌ الرجاء إدخال سعر بيع صحيح!", "error");
                return;
            }

            // التحقق من وجود اسم مطابق بنفس السيريال
            const existingProduct = allProducts.find(p => 
                p.name.toLowerCase() === name.toLowerCase() && 
                p.serial.toLowerCase() === serial.toLowerCase()
            );

            if (existingProduct) {
                // عرض رسالة تأكيد للمستخدم
                const confirmUpdate = confirm(`⚠️ يوجد منتج بنفس الاسم "${name}" والسيريال "${serial}"\n\nالكمية الحالية: ${existingProduct.quantity}\nسعر الشراء: ${existingProduct.buyPrice}\nسعر البيع: ${existingProduct.sellPrice}\n\nهل تريد تحديث بيانات هذا المنتج؟`);
                
                if (confirmUpdate) {
                    // يمكن إضافة منطق التحديث هنا
                    showToast(`📦 يمكن تحديث المنتج ${name} من صفحة الإدارة`, 'success');
                    return;
                } else {
                    return;
                }
            }

            const product = {
                name,
                serial,
                quantity: Number(quantity),
                buyPrice: Number(buyPrice),
                sellPrice: Number(sellPrice),
                createdAt: new Date().toLocaleString('ar-EG')
            };

            try {
                await addDoc(collection(db, "products"), product);
                showToast("✅ تم حفظ المنتج بنجاح", "success");

                // تفريغ الحقول
                document.getElementById("productName").value = "";
                document.getElementById("serial").value = "";
                document.getElementById("quantity").value = "";
                document.getElementById("buyPrice").value = "";
                document.getElementById("sellPrice").value = "";
                
                // إعادة تحميل قائمة المنتجات للاقتراحات
                await loadAllProducts();

            } catch (error) {
                console.error("خطأ عند الحفظ:", error);
                showToast("❌ حدث خطأ أثناء حفظ المنتج!", "error");
            }
        };

        // البحث المباشر عند الكتابة مع تأخير بسيط
        function handleProductNameInput() {
            clearTimeout(searchTimeout);
            const input = document.getElementById('productName');
            const searchText = input.value.trim();
            
            if (searchText === '') {
                const suggestionsBox = document.getElementById('suggestionsBox');
                suggestionsBox.classList.remove('active');
                suggestionsBox.innerHTML = '';
                return;
            }
            
            // تأخير البحث لتقليل العمليات
            searchTimeout = setTimeout(() => {
                showSuggestions();
            }, 300);
        }

        // عرض رسالة منبثقة
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast-message ${type}`;
            const icon = type === 'success' ? 'fa-check-circle' : type === 'warning' ? 'fa-exclamation-triangle' : 'fa-exclamation-circle';
            toast.innerHTML = `<i class="fas ${icon}"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        // إغلاق الاقتراحات عند النقر خارجها
        document.addEventListener('click', function(e) {
            const suggestionsBox = document.getElementById('suggestionsBox');
            const productNameInput = document.getElementById('productName');
            if (productNameInput && !productNameInput.contains(e.target) && suggestionsBox && !suggestionsBox.contains(e.target)) {
                suggestionsBox.classList.remove('active');
            }
        });

        // ربط حدث الكتابة في حقل اسم المنتج
        const productNameInput = document.getElementById('productName');
        if (productNameInput) {
            productNameInput.addEventListener('input', handleProductNameInput);
            
            // إضافة خاصية الإكمال التلقائي السريع
            productNameInput.addEventListener('keydown', function(e) {
                if (e.key === 'Tab' || e.key === 'Enter') {
                    const suggestionsBox = document.getElementById('suggestionsBox');
                    const activeSuggestions = suggestionsBox.querySelectorAll('.suggestion-item');
                    
                    if (activeSuggestions.length > 0 && suggestionsBox.classList.contains('active')) {
                        e.preventDefault();
                        const firstSuggestion = activeSuggestions[0];
                        const onclickAttr = firstSuggestion.getAttribute('onclick');
                        if (onclickAttr) {
                            eval(onclickAttr);
                        }
                    }
                }
            });
        }


        // تحميل المنتجات عند بدء التشغيل
        loadAllProducts();
    </script>
</body>
</html>
