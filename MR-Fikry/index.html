<body>

    <!-- العنوان الرئيسي -->

    <!-- بطاقات الإحصائيات -->

        <div class="stat-card">

    <!-- أزرار التنقل الأنيقة -->
    <div class="nav-grid">
        <a href="prodacts/" class="nav-item">
            <div class="nav-button">
                <div class="nav-icon">
                    <i class="fas fa-box"></i>
                </div>
                <span class="nav-text">المنتجات</span>
                <span class="nav-count">المخزون</span>
            </div>
        </a>

        <a href="Reports/" class="nav-item">
            <div class="nav-button">
                <div class="nav-icon">
                    <i class="fas fa-chart-bar"></i>
                </div>
                <span class="nav-text">التقارير</span>
                <span class="nav-count">تحليلات</span>
            </div>
        </a>

        <a href="employes/" class="nav-item">
            <div class="nav-button">
                <div class="nav-icon">
                    <i class="fas fa-users"></i>
                </div>

        <a href="returns/" class="nav-item">

        <a href="Creditors/" class="nav-item">

                    <i class="fas fa-hand-holding-heart"></i>

       <a href="Debtors/" class="nav-item">
            <div class="nav-button">
                <div class="nav-icon">
                    <i class="fas fa-hand-holding-dollar"></i>
                </div>
                <span class="nav-text">المدينون</span>
                <span class="nav-count">عليهم فلوس</span>
            </div>
        </a>
    </div>


    <!-- Firebase script -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import {
            getFirestore,
            collection,
            getDocs,
            query,
            where,
            Timestamp
        } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDuwURf9DxvGlEIox6J92iPF9-lmnKETH8",
            authDomain: "login-employees1.firebaseapp.com",
            projectId: "login-employees1",
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // عناصر الواجهة
        const todayInvoiceCountEl = document.getElementById('todayInvoiceCount');
        const todaySalesEl = document.getElementById('todaySales');
        const todayProfitEl = document.getElementById('todayProfit');
        const todayDateEl = document.getElementById('todayDate');
        const currentDateEl = document.getElementById('currentDate');

        // عرض التاريخ الحالي بشكل أنيق
        const now = new Date();
        if (currentDateEl) {
            currentDateEl.textContent = now.toLocaleDateString('ar-EG', { 
                year: 'numeric', 
                month: 'numeric', 
                day: 'numeric' 
            });
        }

        async function loadTodayDashboard() {
            try {
                const startOfDay = new Date(now);
                startOfDay.setHours(0,0,0,0);
                const endOfDay = new Date(now);
                endOfDay.setHours(23,59,59,999);

                const q = query(
                    collection(db, 'sales'),
                    where('createdAt', '>=', Timestamp.fromDate(startOfDay)),
                    where('createdAt', '<=', Timestamp.fromDate(endOfDay))
                );

                const snapshot = await getDocs(q);

                let totalSales = 0;
                let totalProfit = 0;

                snapshot.forEach(doc => {
                    const data = doc.data();
                    totalSales += data.totalAmount || 0;

                    if (Array.isArray(data.items)) {
                        data.items.forEach(item => {
                            const profitPerItem = (item.price - (item.buyPrice || 0)) * (item.quantity || 1);
                            totalProfit += profitPerItem;
                        });
                    }
                });

                todayInvoiceCountEl.textContent = snapshot.size;
                todaySalesEl.textContent = `${totalSales.toLocaleString()} جنيه`;
                todayProfitEl.textContent = `${totalProfit.toLocaleString()} جنيه`;
                
                if (todayDateEl) {
                    todayDateEl.textContent = now.toLocaleDateString('ar-EG', { 
                        year: 'numeric', 
                        month: 'short', 
                        day: 'numeric' 
                    });
                }

            } catch (error) {
                console.error('⚠️ خطأ في تحميل البيانات:', error);
                todaySalesEl.textContent = '—';
                todayProfitEl.textContent = '—';
                todayInvoiceCountEl.textContent = '—';
                
                if (todayDateEl) {
                    todayDateEl.textContent = now.toLocaleDateString('ar-EG', { 
                        year: 'numeric', 
                        month: 'short', 
                        day: 'numeric' 
                    });
                }
            }
        }

        loadTodayDashboard();
    </script>

    <!-- سكريبت احتياطي للتاريخ -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const dateEl = document.getElementById('todayDate');
            if (dateEl && !dateEl.innerHTML) {
                const today = new Date();
                dateEl.innerHTML = today.toLocaleDateString('ar-EG', { 
                    year: 'numeric', 
                    month: 'short', 
                    day: 'numeric' 
                });
            }
        });
    </script>
</body>
</html>
